<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="navyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1d3a"/>
      <stop offset="100%" style="stop-color:#2a3a5a"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5a623"/>
      <stop offset="100%" style="stop-color:#f7b84e"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="200" height="200" rx="30" fill="url(#navyGrad)"/>
  <!-- Graduation cap -->
  <polygon points="100,45 155,75 100,95 45,75" fill="url(#goldGrad)"/>
  <rect x="145" y="75" width="4" height="30" fill="url(#goldGrad)"/>
  <circle cx="149" cy="108" r="5" fill="url(#goldGrad)"/>
  <!-- Book pages -->
  <rect x="60" y="105" width="35" height="45" rx="3" fill="white" opacity="0.9"/>
  <rect x="65" y="105" width="35" height="45" rx="3" fill="url(#goldGrad)" opacity="0.8"/>
  <!-- Lines on book -->
  <line x1="72" y1="118" x2="92" y2="118" stroke="white" stroke-width="2" opacity="0.8"/>
  <line x1="72" y1="126" x2="92" y2="126" stroke="white" stroke-width="2" opacity="0.8"/>
  <line x1="72" y1="134" x2="86" y2="134" stroke="white" stroke-width="2" opacity="0.8"/>
  <!-- Star -->
  <polygon points="140,100 143,110 154,110 145,116 148,127 140,121 132,127 135,116 126,110 137,110" fill="url(#goldGrad)"/>
  <!-- Text STEP -->
  <text x="100" y="168" font-family="Arial, sans-serif" font-weight="bold" font-size="16" fill="url(#goldGrad)" text-anchor="middle">STEP 2026</text>
</svg>
